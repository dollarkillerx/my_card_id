<h2>学生证列表展示方式</h2>
<p class="subtitle">主页如何展示多张学生证？</p>

<div class="cards">
  <div class="card" data-choice="a" onclick="toggleSelect(this)">
    <div class="card-image" style="padding: 0; background: #f8f9fa; height: 300px; display: flex; flex-direction: column;">
      <div style="flex: 1; padding: 16px; overflow: hidden;">
        <div style="font-size: 16px; font-weight: 700; color: #1a1a1a; margin-bottom: 14px;">我的学生证</div>

        <!-- Card 1 -->
        <div style="background: white; border-radius: 14px; padding: 14px; border: 1px solid #e5e7eb; margin-bottom: 10px;">
          <div style="display: flex; gap: 12px; align-items: flex-start;">
            <div style="width: 48px; height: 60px; background: #f3f4f6; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px;">👤</div>
            <div style="flex: 1;">
              <div style="font-size: 10px; color: #6366f1; font-weight: 600; letter-spacing: 0.5px;">STUDENT ID</div>
              <div style="font-size: 14px; font-weight: 700; color: #1a1a1a; margin: 2px 0;">张三</div>
              <div style="font-size: 11px; color: #666;">北京大学</div>
              <div style="display: flex; gap: 6px; margin-top: 6px; align-items: center;">
                <span style="font-size: 9px; padding: 2px 8px; background: #dcfce7; color: #16a34a; border-radius: 10px; font-weight: 600;">有效</span>
                <span style="font-size: 9px; color: #999;">2024.09 - 2028.06</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Card 2 -->
        <div style="background: white; border-radius: 14px; padding: 14px; border: 1px solid #e5e7eb;">
          <div style="display: flex; gap: 12px; align-items: flex-start;">
            <div style="width: 48px; height: 60px; background: #f3f4f6; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px;">👤</div>
            <div style="flex: 1;">
              <div style="font-size: 10px; color: #6366f1; font-weight: 600; letter-spacing: 0.5px;">STUDENT ID</div>
              <div style="font-size: 14px; font-weight: 700; color: #1a1a1a; margin: 2px 0;">李四</div>
              <div style="font-size: 11px; color: #666;">东京大学</div>
              <div style="display: flex; gap: 6px; margin-top: 6px; align-items: center;">
                <span style="font-size: 9px; padding: 2px 8px; background: #fef2f2; color: #dc2626; border-radius: 10px; font-weight: 600;">已过期</span>
                <span style="font-size: 9px; color: #999;">2020.04 - 2024.03</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Bottom tab -->
      <div style="display: flex; border-top: 1px solid #e5e7eb; background: white; padding: 8px 0 12px;">
        <div style="flex: 1; text-align: center;">
          <div style="font-size: 16px;">🎴</div>
          <div style="font-size: 9px; color: #6366f1; font-weight: 600;">学生证</div>
        </div>
        <div style="flex: 1; text-align: center;">
          <div style="font-size: 16px;">⚙️</div>
          <div style="font-size: 9px; color: #999;">设置</div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>A. 垂直列表（推荐）</h3>
      <p>上下排列，每张卡片展示头像、姓名、学校、状态，可滚动浏览</p>
    </div>
  </div>

  <div class="card" data-choice="b" onclick="toggleSelect(this)">
    <div class="card-image" style="padding: 0; background: #f8f9fa; height: 300px; display: flex; flex-direction: column;">
      <div style="flex: 1; padding: 16px; overflow: hidden;">
        <div style="font-size: 16px; font-weight: 700; color: #1a1a1a; margin-bottom: 14px;">我的学生证</div>

        <!-- Swipeable card -->
        <div style="position: relative;">
          <!-- Main card (front) -->
          <div style="background: white; border-radius: 16px; padding: 20px; border: 1px solid #e5e7eb; position: relative; z-index: 2;">
            <div style="text-align: center;">
              <div style="width: 64px; height: 80px; background: #f3f4f6; border-radius: 10px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 28px;">👤</div>
              <div style="font-size: 10px; color: #6366f1; font-weight: 600; letter-spacing: 1px;">STUDENT ID</div>
              <div style="font-size: 18px; font-weight: 700; color: #1a1a1a; margin: 4px 0;">张三</div>
              <div style="font-size: 12px; color: #666;">北京大学</div>
              <div style="margin-top: 8px;">
                <span style="font-size: 10px; padding: 3px 10px; background: #dcfce7; color: #16a34a; border-radius: 10px; font-weight: 600;">有效</span>
              </div>
              <div style="font-size: 10px; color: #999; margin-top: 6px;">2024.09 - 2028.06</div>
            </div>
          </div>
          <!-- Stacked card behind -->
          <div style="background: white; border-radius: 16px; height: 40px; border: 1px solid #e5e7eb; position: absolute; bottom: -8px; left: 8px; right: 8px; z-index: 1; opacity: 0.6;"></div>
        </div>

        <!-- Dots indicator -->
        <div style="display: flex; justify-content: center; gap: 6px; margin-top: 16px;">
          <div style="width: 8px; height: 8px; background: #6366f1; border-radius: 50%;"></div>
          <div style="width: 8px; height: 8px; background: #d1d5db; border-radius: 50%;"></div>
        </div>
      </div>

      <!-- Bottom tab -->
      <div style="display: flex; border-top: 1px solid #e5e7eb; background: white; padding: 8px 0 12px;">
        <div style="flex: 1; text-align: center;">
          <div style="font-size: 16px;">🎴</div>
          <div style="font-size: 9px; color: #6366f1; font-weight: 600;">学生证</div>
        </div>
        <div style="flex: 1; text-align: center;">
          <div style="font-size: 16px;">⚙️</div>
          <div style="font-size: 9px; color: #999;">设置</div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>B. 左右滑动卡片</h3>
      <p>一次展示一张完整卡片，左右滑动切换，更有仪式感</p>
    </div>
  </div>
</div>
