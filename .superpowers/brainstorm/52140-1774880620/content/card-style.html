<h2>学生证卡片风格</h2>
<p class="subtitle">选择你喜欢的学生证整体视觉风格</p>

<div class="cards">
  <div class="card" data-choice="a" onclick="toggleSelect(this)">
    <div class="card-image" style="padding: 24px; background: linear-gradient(135deg, #1a237e 0%, #283593 100%); color: white;">
      <div style="display: flex; gap: 16px; align-items: flex-start;">
        <div style="width: 64px; height: 80px; background: rgba(255,255,255,0.2); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 28px;">👤</div>
        <div style="flex: 1;">
          <div style="font-size: 11px; opacity: 0.7; letter-spacing: 2px; text-transform: uppercase;">STUDENT ID</div>
          <div style="font-size: 18px; font-weight: 700; margin: 4px 0;">张三</div>
          <div style="font-size: 12px; opacity: 0.8;">北京大学</div>
          <div style="font-size: 11px; opacity: 0.6; margin-top: 8px;">2024.09 - 2028.06</div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>A. 经典学院风</h3>
      <p>深色渐变背景，正式专业，类似真实学生证</p>
    </div>
  </div>

  <div class="card" data-choice="b" onclick="toggleSelect(this)">
    <div class="card-image" style="padding: 24px; background: white; border: 1px solid #e0e0e0; border-bottom: none;">
      <div style="display: flex; gap: 16px; align-items: flex-start;">
        <div style="width: 64px; height: 80px; background: #f5f5f5; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 28px;">👤</div>
        <div style="flex: 1;">
          <div style="font-size: 11px; color: #6366f1; font-weight: 600; letter-spacing: 1px;">STUDENT ID</div>
          <div style="font-size: 18px; font-weight: 700; color: #1a1a1a; margin: 4px 0;">张三</div>
          <div style="font-size: 12px; color: #666;">北京大学</div>
          <div style="display: flex; gap: 8px; margin-top: 8px;">
            <span style="font-size: 10px; padding: 2px 8px; background: #ede9fe; color: #6366f1; border-radius: 12px;">有效</span>
            <span style="font-size: 10px; color: #999;">2024.09 - 2028.06</span>
          </div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>B. 现代简约风</h3>
      <p>白色卡片，圆角标签，清爽现代感</p>
    </div>
  </div>

  <div class="card" data-choice="c" onclick="toggleSelect(this)">
    <div class="card-image" style="padding: 24px; background: linear-gradient(135deg, #0f172a 0%, #1e293b 60%, #6366f1 100%); color: white; position: relative; overflow: hidden;">
      <div style="position: absolute; top: -20px; right: -20px; width: 100px; height: 100px; background: rgba(99,102,241,0.3); border-radius: 50%;"></div>
      <div style="position: absolute; bottom: -30px; left: 20px; width: 60px; height: 60px; background: rgba(99,102,241,0.2); border-radius: 50%;"></div>
      <div style="display: flex; gap: 16px; align-items: flex-start; position: relative;">
        <div style="width: 64px; height: 80px; background: rgba(255,255,255,0.15); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 28px; backdrop-filter: blur(4px);">👤</div>
        <div style="flex: 1;">
          <div style="font-size: 11px; opacity: 0.6; letter-spacing: 2px;">STUDENT ID</div>
          <div style="font-size: 18px; font-weight: 700; margin: 4px 0;">张三</div>
          <div style="font-size: 12px; opacity: 0.8;">北京大学</div>
          <div style="font-size: 11px; opacity: 0.5; margin-top: 8px;">2024.09 - 2028.06</div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>C. 深色科技风</h3>
      <p>暗色调配合几何装饰，富有科技感</p>
    </div>
  </div>
</div>
