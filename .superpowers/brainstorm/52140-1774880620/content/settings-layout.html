<h2>设置页布局</h2>

<div class="cards">

          <div style="display: flex; align-items: center; padding: 12px 14px; gap: 10px;">
            <div style="width: 32px; height: 32px; background: #ede9fe; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px;">➕</div>
            <div style="flex: 1;">
              <div style="font-size: 13px; font-weight: 600; color: #1a1a1a;">添加学生证</div>
              <div style="font-size: 10px; color: #999;">录入新的学生证信息</div>
            </div>
            <div style="color: #ccc; font-size: 14px;">›</div>
          </div>
        </div>

        <!-- Section: 通用 -->
        <div style="font-size: 10px; color: #999; font-weight: 600; letter-spacing: 1px; margin-bottom: 8px; text-transform: uppercase;">通用</div>
        <div style="background: white; border-radius: 12px; border: 1px solid #e5e7eb;">
          <div style="display: flex; align-items: center; padding: 12px 14px; gap: 10px;">
            <div style="width: 32px; height: 32px; background: #e0f2fe; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px;">🌐</div>
            <div style="flex: 1;">
              <div style="font-size: 13px; font-weight: 600; color: #1a1a1a;">语言</div>
              <div style="font-size: 10px; color: #999;">中文 / 日本語 / English</div>
            </div>
            <div style="color: #ccc; font-size: 14px;">›</div>
          </div>
        </div>
      </div>

      <!-- Bottom tab -->
      <div style="display: flex; border-top: 1px solid #e5e7eb; background: white; padding: 8px 0 12px;">
        <div style="flex: 1; text-align: center;">
          <div style="font-size: 16px;">🎴</div>
          <div style="font-size: 9px; color: #999;">学生证</div>
        </div>
        <div style="flex: 1; text-align: center;">
          <div style="font-size: 16px;">⚙️</div>
          <div style="font-size: 9px; color: #6366f1; font-weight: 600;">设置</div>
        </div>
